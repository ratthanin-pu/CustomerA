AWSTemplateFormatVersion: '2010-09-09'
Description: 'RDS Aurora MySQL Stack - E-commerce-3 Platform'

Parameters:
  ProjectName:
    Type: String
    Default: ecommerce-3

  Environment:
    Type: String
    Default: production

  DBSubnetGroupName:
    Type: String
    Description: DB subnet group name

  DBSecurityGroupId:
    Type: String
    Description: RDS security group ID

  DBMasterUsername:
    Type: String
    NoEcho: true
    MinLength: 1
    MaxLength: 16

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 20
    Description: Master database password

  DBInstanceClass:
    Type: String
    Default: db.r6g.large
    AllowedValues:
      - db.t3.small
      - db.t3.medium
      - db.r6g.large
      - db.r6g.xlarge

  KMSKeyId:
    Type: String
    Description: KMS key ID for encryption

Resources:
  # RDS Aurora Cluster Parameter Group
  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Custom parameter group for Aurora cluster
      Family: aurora-mysql8.0
      Parameters:
        character_set_server: utf8mb4
        collation_server: utf8mb4_unicode_ci
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-aurora-params'

  # RDS Aurora Cluster
  DBCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.02.0'
      DBClusterIdentifier: !Sub '${ProjectName}-aurora-cluster'
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DatabaseName: ecommerce
      DBSubnetGroupName: !Ref DBSubnetGroupName
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroupId
      StorageEncrypted: true
      KmsKeyId: !Ref KMSKeyId
      EnableIAMDatabaseAuthentication: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      EnableCloudwatchLogsExports:
        - audit
        - error
        - general
        - slowquery
      DeletionProtection: true
      EnableHttpEndpoint: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-aurora-cluster'
        - Key: Environment
          Value: !Ref Environment

  # RDS Aurora Cluster Instances
  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-aurora-instance-1'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: false
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      PerformanceInsightsEnabled: true
      PerformanceInsightsKMSKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-aurora-instance-1'

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-aurora-instance-2'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: false
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      PerformanceInsightsEnabled: true
      PerformanceInsightsKMSKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-aurora-instance-2'

  # IAM Role for RDS Monitoring
  RDSMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-rds-monitoring-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole'

  # CloudWatch Alarms
  RDSCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-rds-cpu-high'
      AlarmDescription: RDS CPU utilization is high
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref DBCluster

  RDSConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-rds-connections-high'
      AlarmDescription: RDS database connections are high
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref DBCluster

  RDSStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-rds-storage-high'
      AlarmDescription: RDS storage space is running low
      MetricName: FreeableMemory
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 268435456  # 256 MB
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref DBCluster

Outputs:
  DBClusterIdentifier:
    Description: RDS cluster identifier
    Value: !Ref DBCluster
    Export:
      Name: !Sub '${ProjectName}-DBClusterId'

  DBClusterEndpoint:
    Description: RDS cluster write endpoint
    Value: !GetAtt DBCluster.Endpoint.Address
    Export:
      Name: !Sub '${ProjectName}-DBEndpoint'

  DBClusterPort:
    Description: RDS cluster port
    Value: !GetAtt DBCluster.Endpoint.Port
    Export:
      Name: !Sub '${ProjectName}-DBPort'

  DBReadOnlyEndpoint:
    Description: RDS cluster read-only endpoint
    Value: !GetAtt DBCluster.ReadEndpoint.Address
    Export:
      Name: !Sub '${ProjectName}-DBReadEndpoint'

  DBResourceId:
    Description: RDS cluster resource ID
    Value: !GetAtt DBCluster.ClusterResourceId

  DBName:
    Description: Database name
    Value: !Sub '${DBCluster.DatabaseName}'

  Instance1Endpoint:
    Description: Primary instance endpoint
    Value: !GetAtt DBInstance1.Endpoint.Address

  Instance2Endpoint:
    Description: Secondary instance endpoint
    Value: !GetAtt DBInstance2.Endpoint.Address

  MonitoringRoleArn:
    Description: RDS monitoring role ARN
    Value: !GetAtt RDSMonitoringRole.Arn
