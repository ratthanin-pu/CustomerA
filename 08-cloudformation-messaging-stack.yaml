AWSTemplateFormatVersion: '2010-09-09'
Description: 'Messaging Stack - SQS and SNS for E-commerce-3'

Parameters:
  ProjectName:
    Type: String
    Default: ecommerce-3

  Environment:
    Type: String
    Default: production

  KMSKeyId:
    Type: String

Resources:
  # SNS Topic for Notifications
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-notifications'
      DisplayName: E-commerce-3 Notifications
      KmsMasterKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-notifications'

  # Inventory SQS Queue
  InventoryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-inventory-queue'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400  # 24 hours
      ReceiveMessageWaitTimeSeconds: 20  # Long polling
      KmsMasterKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-inventory-queue'

  # Inventory Dead-Letter Queue
  InventoryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-inventory-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      KmsMasterKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-inventory-dlq'

  # Inventory Queue Policy - Allow access
  InventoryQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref InventoryQueue
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'sqs:SendMessage'
              - 'sqs:ReceiveMessage'
              - 'sqs:DeleteMessage'
              - 'sqs:GetQueueAttributes'
            Resource: !GetAtt InventoryQueue.Arn

  # Order SQS Queue
  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-order-queue'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400  # 24 hours
      ReceiveMessageWaitTimeSeconds: 20
      KmsMasterKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-order-queue'

  # Order Dead-Letter Queue
  OrderDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-order-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      KmsMasterKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-order-dlq'

  # Order Queue Policy
  OrderQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref OrderQueue
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'sqs:SendMessage'
              - 'sqs:ReceiveMessage'
              - 'sqs:DeleteMessage'
              - 'sqs:GetQueueAttributes'
            Resource: !GetAtt OrderQueue.Arn

  # CloudWatch Alarms for SQS
  InventoryQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-inventory-queue-depth-high'
      AlarmDescription: Inventory queue depth is high
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt InventoryQueue.QueueName

  OrderQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-order-queue-depth-high'
      AlarmDescription: Order queue depth is high
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt OrderQueue.QueueName

Outputs:
  NotificationTopicArn:
    Description: SNS notification topic ARN
    Value: !Ref NotificationTopic
    Export:
      Name: !Sub '${ProjectName}-NotificationTopic'

  InventoryQueueURL:
    Description: Inventory SQS queue URL
    Value: !Ref InventoryQueue
    Export:
      Name: !Sub '${ProjectName}-InventoryQueueURL'

  InventoryQueueArn:
    Description: Inventory SQS queue ARN
    Value: !GetAtt InventoryQueue.Arn
    Export:
      Name: !Sub '${ProjectName}-InventoryQueueArn'

  InventoryDLQURL:
    Description: Inventory DLQ URL
    Value: !Ref InventoryDLQ
    Export:
      Name: !Sub '${ProjectName}-InventoryDLQURL'

  OrderQueueURL:
    Description: Order SQS queue URL
    Value: !Ref OrderQueue
    Export:
      Name: !Sub '${ProjectName}-OrderQueueURL'

  OrderQueueArn:
    Description: Order SQS queue ARN
    Value: !GetAtt OrderQueue.Arn
    Export:
      Name: !Sub '${ProjectName}-OrderQueueArn'

  OrderDLQURL:
    Description: Order DLQ URL
    Value: !Ref OrderDLQ
    Export:
      Name: !Sub '${ProjectName}-OrderDLQURL'
