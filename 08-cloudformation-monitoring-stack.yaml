AWSTemplateFormatVersion: '2010-09-09'
Description: 'Monitoring Stack - CloudTrail, CloudWatch, VPC Flow Logs for E-commerce-3'

Parameters:
  ProjectName:
    Type: String
    Default: ecommerce-3

  Environment:
    Type: String
    Default: production

  VpcId:
    Type: String

  CloudTrailBucket:
    Type: String
    Description: S3 bucket for CloudTrail logs

  KMSKeyId:
    Type: String

Resources:
  # CloudWatch Log Group for Application Logs
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/application/${ProjectName}'
      RetentionInDays: 30

  # CloudWatch Log Group for CloudTrail
  CloudTrailLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/cloudtrail/${ProjectName}'
      RetentionInDays: 90

  # IAM Role for CloudTrail to CloudWatch Logs
  CloudTrailLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-cloudtrail-logs-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CloudTrailCloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !GetAtt CloudTrailLogGroup.Arn

  # CloudTrail Trail
  CloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: !Sub '${ProjectName}-trail'
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources:
            - Type: 'AWS::S3::Object'
              Values:
                - 'arn:aws:s3:::*/*'
            - Type: 'AWS::Lambda::Function'
              Values:
                - 'arn:aws:lambda:*:*:function/*'
      CloudWatchLogsGroupArn: !Sub '${CloudTrailLogGroup.Arn}:*'
      CloudWatchLogsRoleArn: !GetAtt CloudTrailLogRole.Arn
      KMSKeyId: !Ref KMSKeyId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-trail'

  # CloudTrail S3 Bucket Policy
  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:GetBucketAcl'
            Resource: !Sub 'arn:aws:s3:::${CloudTrailBucket}'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${CloudTrailBucket}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control

  # VPC Flow Logs Log Group
  VPCFlowLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/vpc/flowlogs/${ProjectName}'
      RetentionInDays: 30

  # IAM Role for VPC Flow Logs
  VPCFlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-vpc-flow-logs-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CloudWatchLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                  - 'logs:DescribeLogGroups'
                  - 'logs:DescribeLogStreams'
                Resource: !GetAtt VPCFlowLogsGroup.Arn

  # VPC Flow Logs
  VPCFlowLogs:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceType: VPC
      ResourceIds:
        - !Ref VpcId
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogsGroup
      DeliverLogsPermissionIAM: !GetAtt VPCFlowLogsRole.Arn
      LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${windowstart} ${windowend} ${action} ${tcpflags} ${type} ${pkt-srcaddr} ${pkt-dstaddr} ${region} ${vpc-id} ${flow-logs-id} ${traffic-type} ${subnet-id} ${instance-id} ${interface-type} ${eni-id} ${srcport} ${dstport}'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc-flow-logs'

  # CloudWatch Dashboard
  OperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${ProjectName}-operations'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/ApplicationELB", "TargetResponseTime", { "stat": "Average" } ],
                  [ ".", "RequestCount", { "stat": "Sum" } ],
                  [ "AWS/RDS", "CPUUtilization", { "stat": "Average" } ],
                  [ ".", "DatabaseConnections", { "stat": "Average" } ],
                  [ "AWS/ElastiCache", "CPUUtilization", { "stat": "Average" } ],
                  [ ".", "Evictions", { "stat": "Sum" } ],
                  [ "AWS/EC2", "CPUUtilization", { "stat": "Average" } ],
                  [ "AWS/AutoScaling", "GroupDesiredCapacity", { "stat": "Average" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "E-commerce-3 Operations Dashboard"
              }
            }
          ]
        }

  # Metric Alarms for Unauthorized API Calls
  UnauthorizedAPICallsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-unauthorized-api-calls'
      AlarmDescription: Unauthorized API calls detected
      MetricName: UnauthorizedAPICallsCount
      Namespace: CloudTrailMetrics
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  CloudTrailName:
    Description: CloudTrail trail name
    Value: !Ref CloudTrail
    Export:
      Name: !Sub '${ProjectName}-CloudTrail'

  ApplicationLogGroup:
    Description: Application CloudWatch log group
    Value: !Ref ApplicationLogGroup
    Export:
      Name: !Sub '${ProjectName}-AppLogGroup'

  CloudTrailLogGroup:
    Description: CloudTrail CloudWatch log group
    Value: !Ref CloudTrailLogGroup
    Export:
      Name: !Sub '${ProjectName}-CloudTrailLogGroup'

  VPCFlowLogsGroup:
    Description: VPC Flow Logs group
    Value: !Ref VPCFlowLogsGroup
    Export:
      Name: !Sub '${ProjectName}-VPCFlowLogsGroup'

  DashboardURL:
    Description: CloudWatch Dashboard URL
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-operations'
    Export:
      Name: !Sub '${ProjectName}-DashboardURL'
