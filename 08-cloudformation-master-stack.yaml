AWSTemplateFormatVersion: '2010-09-09'
Description: 'E-commerce-3 Platform - Master CloudFormation Stack (ap-southeast-1)'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Project Configuration"
        Parameters:
          - ProjectName
          - Environment
          - CostCenter
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCIDR
          - AvailabilityZones
      - Label:
          default: "Database Configuration"
        Parameters:
          - DBMasterUsername
          - DBMasterPassword
          - DBInstanceClass
      - Label:
          default: "Cache Configuration"
        Parameters:
          - RedisAuthToken
          - RedisNodeType
      - Label:
          default: "Compute Configuration"
        Parameters:
          - EC2InstanceType
          - ASGMinSize
          - ASGMaxSize
          - ASGDesiredCapacity
      - Label:
          default: "SSL/TLS Configuration"
        Parameters:
          - ACMCertificateArn

Parameters:
  ProjectName:
    Type: String
    Default: ecommerce-3
    Description: Project name (used for resource naming)
    MinLength: 3
    MaxLength: 32
    AllowedPattern: '^[a-z0-9-]*$'

  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name

  CostCenter:
    Type: String
    Default: engineering
    Description: Cost center for billing

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR block

  AvailabilityZones:
    Type: Number
    Default: 2
    AllowedValues:
      - 2
      - 3
    Description: Number of availability zones

  DBMasterUsername:
    Type: String
    Default: admin
    NoEcho: true
    Description: RDS master username

  DBMasterPassword:
    Type: String
    NoEcho: true
    Description: RDS master password (min 20 chars, use Secrets Manager)
    MinLength: 20

  DBInstanceClass:
    Type: String
    Default: db.r6g.large
    AllowedValues:
      - db.t3.small
      - db.t3.medium
      - db.r6g.large
      - db.r6g.xlarge
    Description: RDS instance class

  RedisAuthToken:
    Type: String
    NoEcho: true
    Description: Redis auth token (min 32 chars)
    MinLength: 32

  RedisNodeType:
    Type: String
    Default: cache.r6g.large
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.r6g.large
      - cache.r6g.xlarge
    Description: ElastiCache node type

  EC2InstanceType:
    Type: String
    Default: t3.xlarge
    AllowedValues:
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m6g.large
      - m6g.xlarge
    Description: EC2 instance type

  ASGMinSize:
    Type: Number
    Default: 2
    MinValue: 1
    Description: ASG minimum size

  ASGMaxSize:
    Type: Number
    Default: 10
    MinValue: 1
    Description: ASG maximum size

  ASGDesiredCapacity:
    Type: Number
    Default: 3
    MinValue: 1
    Description: ASG desired capacity

  ACMCertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS

Conditions:
  IsProduction: !Equals [!Ref Environment, production]

Resources:
  # VPC Stack
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      StackName: !Sub '${ProjectName}-vpc'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/vpc-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        VpcCIDR: !Ref VpcCIDR
        AvailabilityZones: !Ref AvailabilityZones
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: CostCenter
          Value: !Ref CostCenter

  # KMS Stack (Encryption Keys)
  KMSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      StackName: !Sub '${ProjectName}-kms'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/kms-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # RDS Stack
  RDSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - KMSStack
    Properties:
      StackName: !Sub '${ProjectName}-rds'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/rds-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        DBSubnetGroupName: !GetAtt VPCStack.Outputs.DBSubnetGroupName
        DBSecurityGroupId: !GetAtt VPCStack.Outputs.RDSSecurityGroupId
        DBMasterUsername: !Ref DBMasterUsername
        DBMasterPassword: !Ref DBMasterPassword
        DBInstanceClass: !Ref DBInstanceClass
        KMSKeyId: !GetAtt KMSStack.Outputs.KMSKeyId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ElastiCache Stack
  ElastiCacheStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - KMSStack
    Properties:
      StackName: !Sub '${ProjectName}-elasticache'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/elasticache-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        ElastiCacheSecurityGroupId: !GetAtt VPCStack.Outputs.ElastiCacheSecurityGroupId
        RedisAuthToken: !Ref RedisAuthToken
        RedisNodeType: !Ref RedisNodeType
        KMSKeyId: !GetAtt KMSStack.Outputs.KMSKeyId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ALB Stack
  ALBStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      StackName: !Sub '${ProjectName}-alb'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/alb-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PublicSubnetIds: !GetAtt VPCStack.Outputs.PublicSubnetIds
        ALBSecurityGroupId: !GetAtt VPCStack.Outputs.ALBSecurityGroupId
        ACMCertificateArn: !Ref ACMCertificateArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # EC2 ASG Stack
  EC2ASGStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - ALBStack
      - KMSStack
    Properties:
      StackName: !Sub '${ProjectName}-ec2-asg'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/ec2-asg-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        EC2SecurityGroupId: !GetAtt VPCStack.Outputs.EC2SecurityGroupId
        TargetGroupArn: !GetAtt ALBStack.Outputs.TargetGroupArn
        InstanceType: !Ref EC2InstanceType
        MinSize: !Ref ASGMinSize
        MaxSize: !Ref ASGMaxSize
        DesiredCapacity: !Ref ASGDesiredCapacity
        KMSKeyId: !GetAtt KMSStack.Outputs.KMSKeyId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Messaging Stack (SQS, SNS)
  MessagingStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: KMSStack
    Properties:
      StackName: !Sub '${ProjectName}-messaging'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/messaging-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        KMSKeyId: !GetAtt KMSStack.Outputs.KMSKeyId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Storage Stack (S3, CloudFront)
  StorageStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: KMSStack
    Properties:
      StackName: !Sub '${ProjectName}-storage'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/storage-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        KMSKeyId: !GetAtt KMSStack.Outputs.KMSKeyId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Monitoring Stack (CloudTrail, CloudWatch, VPC Flow Logs)
  MonitoringStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - KMSStack
      - StorageStack
    Properties:
      StackName: !Sub '${ProjectName}-monitoring'
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplatesBucket}/monitoring-stack.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        CloudTrailBucket: !GetAtt StorageStack.Outputs.CloudTrailBucket
        KMSKeyId: !GetAtt KMSStack.Outputs.KMSKeyId
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Templates Bucket (for nested stacks)
  TemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-cf-templates-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  VpcId:
    Description: VPC ID
    Value: !GetAtt VPCStack.Outputs.VpcId
    Export:
      Name: !Sub '${ProjectName}-VpcId'

  RDSEndpoint:
    Description: RDS cluster endpoint
    Value: !GetAtt RDSStack.Outputs.ClusterEndpoint
    Export:
      Name: !Sub '${ProjectName}-RDSEndpoint'

  ElastiCacheEndpoint:
    Description: ElastiCache cluster endpoint
    Value: !GetAtt ElastiCacheStack.Outputs.CacheNodeAddress
    Export:
      Name: !Sub '${ProjectName}-ElastiCacheEndpoint'

  LoadBalancerDNS:
    Description: Application Load Balancer DNS
    Value: !GetAtt ALBStack.Outputs.LoadBalancerDNS
    Export:
      Name: !Sub '${ProjectName}-ALB-DNS'

  InventoryQueueURL:
    Description: Inventory SQS queue URL
    Value: !GetAtt MessagingStack.Outputs.InventoryQueueURL
    Export:
      Name: !Sub '${ProjectName}-InventoryQueueURL'

  OrderQueueURL:
    Description: Order SQS queue URL
    Value: !GetAtt MessagingStack.Outputs.OrderQueueURL
    Export:
      Name: !Sub '${ProjectName}-OrderQueueURL'

  NotificationTopicArn:
    Description: SNS notification topic ARN
    Value: !GetAtt MessagingStack.Outputs.NotificationTopicArn
    Export:
      Name: !Sub '${ProjectName}-NotificationTopicArn'

  ProductsBucket:
    Description: S3 bucket for product images
    Value: !GetAtt StorageStack.Outputs.ProductsBucket
    Export:
      Name: !Sub '${ProjectName}-ProductsBucket'

  CloudFrontDistribution:
    Description: CloudFront distribution domain
    Value: !GetAtt StorageStack.Outputs.CloudFrontDomain
    Export:
      Name: !Sub '${ProjectName}-CloudFrontDomain'

  StacksCreated:
    Description: CloudFormation stacks created
    Value: !Sub |
      VPC Stack: ${VPCStack}
      KMS Stack: ${KMSStack}
      RDS Stack: ${RDSStack}
      ElastiCache Stack: ${ElastiCacheStack}
      ALB Stack: ${ALBStack}
      EC2 ASG Stack: ${EC2ASGStack}
      Messaging Stack: ${MessagingStack}
      Storage Stack: ${StorageStack}
      Monitoring Stack: ${MonitoringStack}
